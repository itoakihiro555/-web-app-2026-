<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>  
    const user = { username: "taro", age: 20 };

    console.log(user.username); // "taro"  ← ドット記法
    console.log(user["age"]);   // 20      ← ブラケット記法
    console.log(typeof { username: "taro" })     // "object"
    console.log(typeof '{"username":"taro"}')    // "string"
    </script>
</body>
</html>
